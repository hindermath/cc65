schema_version: "1.0"

preset:
  id: "intake-review-governance"
  name: "Intake Review Governance"
  version: "0.1.1"
  description: "Reviews single, series, and campaign intake files before Spec Kit execution and binds accepted outcomes to normalized content hashes."
  author: "Thorsten Hindermann"
  repository: "https://github.com/hindermath/spec-kit-preset-intake-review-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.8.3"

provides:
  templates:
    - type: "template"
      name: "intake-review-policy-template"
      file: "templates/intake-review-policy-template.json"
      description: "Project policy for optional or mandatory intake review"
    - type: "template"
      name: "intake-review-request-template"
      file: "templates/intake-review-request-template.json"
      description: "Single, series, or campaign review request"
    - type: "template"
      name: "intake-review-result-template"
      file: "templates/intake-review-result-template.json"
      description: "Machine-readable review outcome bound to normalized intake hashes"
    - type: "template"
      name: "intake-review-report-template"
      file: "templates/intake-review-report-template.md"
      description: "Human-readable review report"
    - type: "template"
      name: "intake-review-checklist-template"
      file: "templates/intake-review-checklist-template.md"
      description: "Review dimensions for single, series, and campaign modes"
    - type: "template"
      name: "intake-review-runbook-template"
      file: "templates/intake-review-runbook-template.md"
      description: "Portable review, repair, status, and consumer-gate runbook"
    - type: "template"
      name: "intake-review-agent-guidance-addendum-template"
      file: "templates/agent-file-addendum.md"
      description: "Agent-neutral intake-review guidance"
    - type: "template"
      name: "intake-review-field-validation-summary"
      file: "templates/field-validation-summary.md"
      description: "Synthetic and field validation summary"
    - type: "command"
      name: "speckit.intake-review"
      file: "commands/speckit.intake-review.md"
      description: "Review intake files without changing their content"
    - type: "command"
      name: "speckit.intake-repair"
      file: "commands/speckit.intake-repair.md"
      description: "Repair explicitly authorized intake findings and re-review"
    - type: "command"
      name: "speckit.intake-review-status"
      file: "commands/speckit.intake-review-status.md"
      description: "Inspect intake-review freshness without changing files"

tags:
  - "intake"
  - "review"
  - "governance"
  - "spec-kit"
  - "quality-gate"
  - "autonomous"
  - "campaign"
