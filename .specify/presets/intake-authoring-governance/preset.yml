schema_version: "1.0"

preset:
  id: "intake-authoring-governance"
  name: "Intake Authoring Governance"
  version: "0.1.0"
  description: "Turns ordered UTF-8 planning sources into one traceable Spec Kit intake with safe copy-ready Specify and Autonomous prompts."
  author: "Thorsten Hindermann"
  repository: "https://github.com/hindermath/spec-kit-preset-intake-authoring-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.8.3"

provides:
  templates:
    - type: "template"
      name: "intake-authoring-policy-template"
      file: "templates/intake-authoring-policy-template.json"
      description: "Project policy for target paths, profiles, language, and overwrite protection"
    - type: "template"
      name: "intake-authoring-receipt-template"
      file: "templates/intake-authoring-receipt-template.json"
      description: "Machine-readable source and output provenance receipt"
    - type: "template"
      name: "intake-authoring-intake-template"
      file: "templates/intake-template.md"
      description: "Portable Spec Kit-ready intake core with safe prompt markers"
    - type: "template"
      name: "intake-authoring-profile-template"
      file: "templates/project-profile-template.md"
      description: "Repository-owned profile extension contract"
    - type: "template"
      name: "intake-authoring-runbook-template"
      file: "templates/intake-authoring-runbook-template.md"
      description: "Portable create, clarification, update, status, and handoff runbook"
    - type: "template"
      name: "intake-authoring-agent-guidance-addendum-template"
      file: "templates/agent-file-addendum.md"
      description: "Agent-neutral intake-authoring guidance"
    - type: "template"
      name: "intake-authoring-field-validation-summary"
      file: "templates/field-validation-summary.md"
      description: "Synthetic, composition, and field validation summary"
    - type: "command"
      name: "speckit.intake-create"
      file: "commands/speckit.intake-create.md"
      description: "Create exactly one traceable intake from inline and ordered UTF-8 text sources"
    - type: "command"
      name: "speckit.intake-create-status"
      file: "commands/speckit.intake-create-status.md"
      description: "Inspect source, target, receipt, and prompt freshness without writes"

tags:
  - "intake"
  - "authoring"
  - "requirements"
  - "governance"
  - "spec-kit"
  - "provenance"
  - "autonomous"
