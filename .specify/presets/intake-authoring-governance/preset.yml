schema_version: "1.0"

preset:
  id: "intake-authoring-governance"
  name: "Intake Authoring Governance"
  version: "0.2.0"
  description: "Governs traceable intake CRUD, bounded public HTTPS sources, and explicitly approved single or series authoring."
  author: "Thorsten Hindermann"
  repository: "https://github.com/hindermath/spec-kit-preset-intake-authoring-governance"
  license: "MIT"

requires:
  speckit_version: ">=0.8.3"

provides:
  templates:
    - type: "template"
      name: "intake-authoring-policy-template"
      file: "templates/intake-authoring-policy-template.json"
      description: "Project policy for target paths, profiles, language, and overwrite protection"
    - type: "template"
      name: "intake-authoring-receipt-template"
      file: "templates/intake-authoring-receipt-template.json"
      description: "Machine-readable schema-2.0 lifecycle receipt"
    - type: "template"
      name: "intake-authoring-series-template"
      file: "templates/intake-authoring-series-template.json"
      description: "Approved multi-intake coverage, order, DAG, and lineage manifest"
    - type: "template"
      name: "intake-authoring-operation-template"
      file: "templates/intake-authoring-operation-template.json"
      description: "Transactional proposal, approval, validation, and publication journal"
    - type: "template"
      name: "intake-authoring-tombstone-template"
      file: "templates/intake-authoring-tombstone-template.json"
      description: "Logical deletion and byte-identical archive evidence"
    - type: "template"
      name: "intake-authoring-intake-template"
      file: "templates/intake-template.md"
      description: "Portable Spec Kit-ready intake core with safe prompt markers"
    - type: "template"
      name: "intake-authoring-profile-template"
      file: "templates/project-profile-template.md"
      description: "Repository-owned profile extension contract"
    - type: "template"
      name: "intake-authoring-runbook-template"
      file: "templates/intake-authoring-runbook-template.md"
      description: "Portable create, clarification, update, status, and handoff runbook"
    - type: "template"
      name: "intake-authoring-agent-guidance-addendum-template"
      file: "templates/agent-file-addendum.md"
      description: "Agent-neutral intake-authoring guidance"
    - type: "template"
      name: "intake-authoring-field-validation-summary"
      file: "templates/field-validation-summary.md"
      description: "Synthetic, composition, and field validation summary"
    - type: "command"
      name: "speckit.intake-create"
      file: "commands/speckit.intake-create.md"
      description: "Create one new intake or one explicitly approved intake series"
    - type: "command"
      name: "speckit.intake-read"
      file: "commands/speckit.intake-read.md"
      description: "Summarize one intake or series read-only in Summary, Detailed, or JSON form"
    - type: "command"
      name: "speckit.intake-update"
      file: "commands/speckit.intake-update.md"
      description: "Explicitly update one intake or migrate one approved intake series"
    - type: "command"
      name: "speckit.intake-delete"
      file: "commands/speckit.intake-delete.md"
      description: "Logically delete active intake artifacts through archive and tombstone evidence"
    - type: "command"
      name: "speckit.intake-create-status"
      file: "commands/speckit.intake-create-status.md"
      description: "Inspect source, target, receipt, and prompt freshness without writes"

tags:
  - "intake"
  - "authoring"
  - "requirements"
  - "governance"
  - "spec-kit"
  - "provenance"
  - "crud"
  - "url"
  - "series"
  - "autonomous"
